<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>つたえるくん</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap');

  :root {
    --bg: #f5f0eb;
    --surface: #ffffff;
    --surface2: #f0ebe4;
    --accent-a: #d4845a;
    --accent-b: #5a7fd4;
    --accent: #d4845a;
    --text: #2c2420;
    --text-muted: #9e8e82;
    --user-bubble: #d4845a;
    --ai-bubble: #ffffff;
    --border: #e8ddd5;
    --success: #7a9e7e;
    --shadow: 0 2px 12px rgba(44,36,32,0.08);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    height: -webkit-fill-available;
    overflow: hidden;
  }

  body {
    font-family: 'Noto Sans JP', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* ===== Header ===== */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 14px 0;
    flex-shrink: 0;
    box-shadow: var(--shadow);
    position: relative;
    z-index: 10;
  }

  .header-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .header-icon {
    width: 38px; height: 38px;
    border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
    font-size: 19px;
    flex-shrink: 0;
    transition: background 0.3s;
  }

  .header-text h1 {
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.3;
  }

  .header-text p {
    font-size: 11px;
    color: var(--text-muted);
  }

  .reset-btn {
    margin-left: auto;
    background: var(--surface2);
    border: none;
    color: var(--text-muted);
    padding: 7px 13px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    flex-shrink: 0;
    min-height: 36px;
  }
  .reset-btn:active { opacity: 0.7; }

  /* ===== Mode Tab ===== */
  .mode-tabs {
    display: flex;
    gap: 0;
    border-radius: 0;
  }

  .mode-tab {
    flex: 1;
    padding: 9px 6px;
    font-size: 13px;
    font-weight: 700;
    font-family: inherit;
    border: none;
    background: none;
    color: var(--text-muted);
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }

  .mode-tab.active-a {
    color: var(--accent-a);
    border-bottom-color: var(--accent-a);
  }

  .mode-tab.active-b {
    color: var(--accent-b);
    border-bottom-color: var(--accent-b);
  }

  /* ===== 上司の質問入力エリア（モードBのみ表示） ===== */
  #bossInputArea {
    background: #eef2fa;
    border-bottom: 1px solid #c5d3ee;
    padding: 10px 14px;
    display: none;
    flex-shrink: 0;
  }

  #bossInputArea.visible { display: block; }

  .boss-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--accent-b);
    margin-bottom: 6px;
    letter-spacing: 0.04em;
  }

  .boss-input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  #bossQuestion {
    flex: 1;
    background: white;
    border: 1.5px solid #c5d3ee;
    border-radius: 10px;
    color: var(--text);
    font-family: inherit;
    font-size: 16px;
    padding: 9px 13px;
    resize: none;
    min-height: 44px;
    max-height: 100px;
    line-height: 1.5;
    outline: none;
    -webkit-overflow-scrolling: touch;
  }
  #bossQuestion:focus { border-color: var(--accent-b); }
  #bossQuestion::placeholder { color: #a0b0cc; }

  .boss-set-btn {
    background: var(--accent-b);
    border: none;
    color: white;
    padding: 9px 14px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    white-space: nowrap;
    min-height: 44px;
  }
  .boss-set-btn:active { opacity: 0.8; }

  /* 設定済み質問表示 */
  .boss-set-display {
    display: none;
    background: white;
    border: 1.5px solid var(--accent-b);
    border-radius: 10px;
    padding: 9px 13px;
    font-size: 13px;
    color: var(--text);
    line-height: 1.5;
    position: relative;
  }
  .boss-set-display.visible { display: block; }
  .boss-set-display .boss-q-text { padding-right: 50px; }
  .boss-clear-btn {
    position: absolute;
    right: 8px; top: 50%; transform: translateY(-50%);
    background: #eef2fa;
    border: none;
    color: var(--accent-b);
    padding: 4px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
  }

  /* ===== Chat area ===== */
  #chat {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 14px 14px;
    display: flex;
    flex-direction: column;
    gap: 11px;
  }

  .bubble {
    max-width: 86%;
    padding: 11px 14px;
    border-radius: 18px;
    font-size: 15px;
    line-height: 1.7;
    animation: fadeIn 0.25s ease;
    word-break: break-word;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .bubble.ai {
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    align-self: flex-start;
    border-radius: 4px 18px 18px 18px;
    box-shadow: var(--shadow);
  }

  .bubble.user {
    color: white;
    align-self: flex-end;
    border-radius: 18px 4px 18px 18px;
  }

  .mode-a .bubble.user { background: var(--accent-a); }
  .mode-b .bubble.user { background: var(--accent-b); }

  .bubble.system {
    background: rgba(154,130,114,0.1);
    border: 1px dashed #c8b8ae;
    align-self: center;
    font-size: 12px;
    color: var(--text-muted);
    text-align: center;
    max-width: 92%;
    border-radius: 10px;
    padding: 8px 14px;
  }

  .bubble-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.06em;
    margin-bottom: 5px;
  }
  .ai .bubble-label { color: var(--accent); }
  .user .bubble-label { color: rgba(255,255,255,0.75); text-align: right; }

  /* 清書カード */
  .result-card {
    background: white;
    border: 2px solid var(--success);
    border-radius: 16px;
    padding: 14px;
    align-self: stretch;
    animation: fadeIn 0.4s ease;
    box-shadow: var(--shadow);
  }

  .result-label {
    font-size: 12px;
    font-weight: 700;
    color: var(--success);
    margin-bottom: 9px;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .result-text {
    font-size: 15px;
    line-height: 1.8;
    color: var(--text);
    background: var(--bg);
    border-radius: 10px;
    padding: 11px 13px;
    white-space: pre-wrap;
    word-break: break-all;
    margin-bottom: 11px;
    border: 1px solid var(--border);
  }

  .copy-btn {
    color: white;
    border: none;
    padding: 14px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    min-height: 50px;
    background: var(--success);
  }
  .copy-btn:active { opacity: 0.8; }
  .copy-btn.copied { background: var(--text-muted); }

  /* Loading */
  .thinking {
    align-self: flex-start;
    display: flex;
    gap: 5px;
    padding: 13px 15px;
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    border-radius: 4px 18px 18px 18px;
    box-shadow: var(--shadow);
  }
  .dot {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%,60%,100% { transform: translateY(0); opacity: 0.3; }
    30% { transform: translateY(-7px); opacity: 1; }
  }

  /* ===== Input area ===== */
  footer {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 10px 12px;
    padding-bottom: max(10px, env(safe-area-inset-bottom));
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }

  textarea#input {
    flex: 1;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 22px;
    color: var(--text);
    font-family: inherit;
    font-size: 16px;
    padding: 10px 16px;
    resize: none;
    min-height: 44px;
    max-height: 130px;
    line-height: 1.5;
    outline: none;
    -webkit-appearance: none;
    -webkit-overflow-scrolling: touch;
    transition: border-color 0.2s;
  }
  textarea#input:focus { border-color: var(--accent); background: white; }
  textarea#input::placeholder { color: var(--text-muted); }

  .send-btn {
    border: none;
    color: white;
    width: 48px; height: 48px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 20px;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.3s;
  }
  .send-btn:active { transform: scale(0.92); opacity: 0.85; }
  .send-btn:disabled { opacity: 0.35; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="header-icon" id="headerIcon">💬</div>
    <div class="header-text">
      <h1 id="headerTitle">つたえるくん</h1>
      <p id="headerSub">伝言&返答 作成ツール</p>
    </div>
    <button class="reset-btn" onclick="resetChat()">最初から</button>
  </div>
  <div class="mode-tabs">
    <button class="mode-tab active-a" id="tabA" onclick="switchMode('a')">
      💬 伝言を作る
    </button>
    <button class="mode-tab" id="tabB" onclick="switchMode('b')">
      📋 上司の質問に答える
    </button>
  </div>
</header>

<!-- モードB：上司の質問入力エリア -->
<div id="bossInputArea">
  <div class="boss-label">📌 上司からの質問</div>
  <!-- 入力フォーム -->
  <div id="bossForm">
    <div class="boss-input-row">
      <textarea id="bossQuestion" placeholder="上司からの質問をここに入力…" rows="1" oninput="autoResizeBoss(this)"></textarea>
      <button class="boss-set-btn" onclick="setBossQuestion()">セット</button>
    </div>
  </div>
  <!-- 設定済み表示 -->
  <div class="boss-set-display" id="bossDisplay">
    <div class="boss-q-text" id="bossDisplayText"></div>
    <button class="boss-clear-btn" onclick="clearBossQuestion()">変更</button>
  </div>
</div>

<div id="chat" class="mode-a"></div>

<footer>
  <div class="input-row">
    <textarea id="input" placeholder="ここに話しかけてください…" rows="1" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="send()" style="background:var(--accent-a);">➤</button>
  </div>
</footer>

<script>
// ============================
// システムプロンプト定義
// ============================
const PROMPT_A = `あなたは「つたえるくん」、コミュニケーション整理アシスタントです。

# ヒロミさんについて
- 前段なしで話し始めることが多い（「あれ」「それ」「あの件」など文脈なしで始まる）
- 省略が多く、何のことか分からないことが多い
- 質問すると言い訳や的外れな返答が返ってくることがある
- 質問を質問で返してくることがある
- 「自分は悪くない」という前提があり、そのまま話が進むことがある
- できない理由を探す傾向がある（「〇〇だったらできない」「こうなると無理」など）
- 褒められると気分が良くなり、前向きになりやすい
- 定期的に褒められたい・認められたいという気質がある

# あなたの役割
ヒロミさんが断片的・省略的に話しかけてきても、丁寧に対話しながら「本当に伝えたいこと」を引き出し、最終的にグループLINEなどに送れる清書テキストを作成することです。

# 対話ルール
1. まず受け止める: ヒロミさんの発言をまず肯定的に受け止める。責めない。
2. 1問1答で深掘り: 足りない情報は一度に複数聞かず、直前の発言に最も関係する1つだけ聞く。例えば「誰に」が不明なら「誰にお願いしたいですか？」だけ聞く。
3. 文脈を正確に読む: 直前のやり取りをしっかり踏まえて質問する。前の返答を無視した質問は絶対にしない。
4. 軌道修正: 言い訳や的外れな返答が来ても「なるほど、ちなみに〜は？」と優しく本題に戻す。
5. 質問返しへの対応: 「まずこちらをお聞かせください」と穏やかに誘導する。
6. できない理由への対応: 「なるほど、では〜という条件だったらいかがですか？」と前向きな方向に切り返す。
7. 承認を挟む: 情報が出てきたら「ありがとうございます」「それは大事なポイントですね」など適度に承認する。
8. 清書判断: 必要な情報が揃ったと判断したら、JSON形式で出力する。

# 清書タイミングの判断基準
- 誰に・何を・いつ・どうしてほしいかが揃ったら清書可能
- 多少情報が不完全でも、グループLINEとして送れるレベルになれば清書する

# 清書のルール（重要）
- マークダウン記号（**、##、-など）は一切使わない
- 箇条書きにする場合は「・」を使う
- 自然な日本語の文章で書く
- LINEで送ることを意識したシンプルで読みやすい文体にする
- 堅苦しくなりすぎず、自然な話し言葉に近い文体にする

# 清書出力フォーマット（情報が揃ったとき）
必ず以下のJSONを出力してください（他のテキストと混在させてもOK）：
\`\`\`json
{"type":"result","text":"ここに清書済みLINEテキストを記載"}
\`\`\`

# 会話のトーン
- 丁寧だが親しみやすい
- 責めない・急かさない
- ヒロミさんのペースに合わせる
- 短い質問を心がける（1文で終わる質問）
- 最初の挨拶: 「こんにちは！😊 今日は何を伝えたいですか？どんなことでも、まずお話しください。」`;

const PROMPT_B_BASE = `あなたは「つたえるくん」、上司の質問回答サポートアシスタントです。

# ヒロミさんについて
- 前段なしで話し始めることが多い
- 省略が多く、何のことか分からないことが多い
- 質問すると言い訳や的外れな返答が返ってくることがある
- 質問を質問で返してくることがある
- 「自分は悪くない」という前提があり、話が進むことがある
- できない理由を探す傾向がある
- 褒められると気分が良くなり、前向きになりやすい

# あなたの役割
上司からヒロミさんへの質問が与えられています。
ヒロミさんが「どう答えたいか」「何を伝えたいか」を対話で引き出し、
上司への返答として適切な文章に清書することです。

# 上司からの質問
{BOSS_QUESTION}

# 対話ルール
1. まず上司の質問を確認し「この質問にどう答えたいですか？」と聞く
2. ヒロミさんの断片的な返答を受け止め、直前の発言に関係する1つだけ深掘りする
3. 文脈を正確に読む: 直前のやり取りをしっかり踏まえて質問する。前の返答を無視した質問は絶対にしない。
4. 言い訳・的外れ・質問返しが来ても穏やかに本題に戻す
5. できない理由が出たら「では〜という形ではいかがですか？」と前向きに切り返す
6. 上司への返答として筋が通る内容が揃ったら清書する

# 清書タイミングの判断基準
- 上司の質問に対する答えの骨子が揃ったら清書可能
- 完璧でなくても、返答として成立するレベルになれば清書する

# 清書のルール（重要）
- マークダウン記号（**、##、-など）は一切使わない
- 箇条書きにする場合は「・」を使う
- 自然な日本語の文章で書く
- LINEで送ることを意識したシンプルで読みやすい文体にする
- 堅苦しくなりすぎず、自然な話し言葉に近い文体にする

# 清書出力フォーマット（情報が揃ったとき）
必ず以下のJSONを出力してください（他のテキストと混在させてもOK）：
\`\`\`json
{"type":"result","text":"ここに清書済み返答テキストを記載"}
\`\`\`

# 会話のトーン
- 丁寧だが親しみやすい
- 責めない・急かさない
- 短い質問を心がける（1文で終わる質問）
- 最初: 上司からの質問を確認し「この質問に、どう答えたいか少し教えてください😊」と聞く`;

// ============================
// 状態管理
// ============================
let currentMode = 'a';
let historyA = [];
let historyB = [];
let isLoading = false;
let bossQuestionText = '';
let bossQuestionSet = false;

const chatEl = document.getElementById('chat');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');

// ============================
// モード切り替え
// ============================
function switchMode(mode) {
  if (mode === currentMode) return;
  currentMode = mode;

  const tabA = document.getElementById('tabA');
  const tabB = document.getElementById('tabB');
  const bossArea = document.getElementById('bossInputArea');
  const headerIcon = document.getElementById('headerIcon');
  const headerSub = document.getElementById('headerSub');

  tabA.className = 'mode-tab' + (mode === 'a' ? ' active-a' : '');
  tabB.className = 'mode-tab' + (mode === 'b' ? ' active-b' : '');

  chatEl.className = mode === 'a' ? 'mode-a' : 'mode-b';

  if (mode === 'a') {
    bossArea.classList.remove('visible');
    headerIcon.textContent = '💬';
    headerSub.textContent = '伝言&返答 作成ツール';
    sendBtn.style.background = 'var(--accent-a)';
    inputEl.style.borderColor = '';
    document.documentElement.style.setProperty('--accent', 'var(--accent-a)');
    inputEl.placeholder = 'ここに話しかけてください…';
  } else {
    bossArea.classList.add('visible');
    headerIcon.textContent = '📋';
    headerSub.textContent = '上司の質問 → 対話 → 返答を清書';
    sendBtn.style.background = 'var(--accent-b)';
    document.documentElement.style.setProperty('--accent', 'var(--accent-b)');
    inputEl.placeholder = 'アシスタントに話しかけてください…';
  }

  // チャット表示を切り替え（履歴を保持）
  renderHistory();
  chatEl.scrollTop = chatEl.scrollHeight;
}

function renderHistory() {
  // 現在のモードのUI要素のみ再描画
  // 実際は別のdivでそれぞれ保持する方が理想だが、
  // シンプルに履歴からメッセージを再構築
  // → historyにUI情報を付加して保持する方式
}

// ============================
// 上司の質問セット
// ============================
function setBossQuestion() {
  const q = document.getElementById('bossQuestion').value.trim();
  if (!q) return;
  bossQuestionText = q;
  bossQuestionSet = true;

  document.getElementById('bossForm').style.display = 'none';
  const display = document.getElementById('bossDisplay');
  display.classList.add('visible');
  document.getElementById('bossDisplayText').textContent = '「' + q + '」';

  // 会話をリセットして上司の質問を反映した状態で開始
  chatEl.innerHTML = '';
  historyB = [];
  initB();
}

function clearBossQuestion() {
  bossQuestionText = '';
  bossQuestionSet = false;
  document.getElementById('bossQuestion').value = '';
  document.getElementById('bossForm').style.display = 'block';
  document.getElementById('bossDisplay').classList.remove('visible');
  chatEl.innerHTML = '';
  historyB = [];
  addBubble('ai', '上司からの質問を入力してください。');
}

function autoResizeBoss(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

// ============================
// バブル・UI描画
// ============================
function addBubble(role, text) {
  const div = document.createElement('div');
  if (role === 'system') {
    div.className = 'bubble system';
    div.textContent = text;
  } else {
    div.className = `bubble ${role}`;
    const label = document.createElement('div');
    label.className = 'bubble-label';
    label.textContent = role === 'ai' ? 'アシスタント' : 'ヒロミさん';
    div.appendChild(label);
    const content = document.createElement('div');
    content.textContent = text;
    div.appendChild(content);
  }
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function addResult(text) {
  const card = document.createElement('div');
  card.className = 'result-card';
  const safeText = JSON.stringify(text);
  card.innerHTML = `
    <div class="result-label">✅ 清書できました！コピーして送れます</div>
    <div class="result-text">${escapeHtml(text)}</div>
    <button class="copy-btn" onclick="copyText(this, ${safeText})">📋 コピーする</button>
  `;
  chatEl.appendChild(card);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function copyText(btn, text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => showCopied(btn));
  } else {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    try { document.execCommand('copy'); showCopied(btn); } catch(e) {}
    document.body.removeChild(ta);
  }
}

function showCopied(btn) {
  btn.textContent = '✓ コピーしました！';
  btn.className = 'copy-btn copied';
  setTimeout(() => {
    btn.textContent = '📋 コピーする';
    btn.className = 'copy-btn';
  }, 2500);
}

function addThinking() {
  const div = document.createElement('div');
  div.className = 'thinking';
  div.id = 'thinking';
  div.innerHTML = '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
}

function removeThinking() {
  const el = document.getElementById('thinking');
  if (el) el.remove();
}

// ============================
// API呼び出し
// ============================
const GEMINI_API_KEY = 'AQ.Ab8RN6LaZXic6DEvWDVsAE9gbyPs1bRaD99jmfMPMH63zHdhOw';
const GEMINI_MODEL = 'gemini-2.5-flash';

async function callClaude(userMessage, mode) {
  const history = mode === 'a' ? historyA : historyB;
  const systemPrompt = mode === 'a'
    ? PROMPT_A
    : PROMPT_B_BASE.replace('{BOSS_QUESTION}', bossQuestionText || '（未設定）');

  // エラー時に取り消せるようにpushしておく
  history.push({ role: 'user', content: userMessage });

  // 直近10件のみ送信（トークン数制限対策）
  const recentHistory = history.slice(-10);
  const contents = recentHistory.map(m => ({
    role: m.role === 'assistant' ? 'model' : 'user',
    parts: [{ text: m.content }]
  }));

  const endpoint = 'https://generativelanguage.googleapis.com/v1beta/models/'
    + GEMINI_MODEL + ':generateContent?key=' + GEMINI_API_KEY;

  let response;
  try {
    response = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system_instruction: { parts: [{ text: systemPrompt }] },
        contents: contents,
        generationConfig: { maxOutputTokens: 1500, temperature: 0.7 }
      })
    });
  } catch(fetchErr) {
    // ネットワークエラー時はuserの発言を履歴から取り消す
    history.pop();
    throw fetchErr;
  }

  const data = await response.json();
  if (data.error) {
    // APIエラー時もuserの発言を履歴から取り消す
    history.pop();
    const errMsg = `APIエラー(${data.error.code}): ${data.error.message}`;
    throw new Error(errMsg);
  }
  const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || 'エラーが発生しました';
  history.push({ role: 'assistant', content: reply });
  return reply;
}

function parseReply(reply) {
  const match = reply.match(/```json\s*([\s\S]*?)\s*```/);
  let resultText = null;
  let displayText = reply;
  if (match) {
    try {
      const parsed = JSON.parse(match[1]);
      if (parsed.type === 'result') {
        resultText = parsed.text;
        displayText = reply.replace(/```json[\s\S]*?```/, '').trim();
      }
    } catch(e) {}
  }
  return { displayText, resultText };
}

// ============================
// 送信
// ============================
async function send() {
  const text = inputEl.value.trim();
  if (!text || isLoading) return;

  // モードBで上司の質問が未設定なら案内
  if (currentMode === 'b' && !bossQuestionSet) {
    addBubble('system', '上司からの質問を先に入力・セットしてください。');
    return;
  }

  inputEl.value = '';
  inputEl.style.height = 'auto';
  isLoading = true;
  sendBtn.disabled = true;

  addBubble('user', text);
  addThinking();

  try {
    const reply = await callClaude(text, currentMode);
    removeThinking();
    const { displayText, resultText } = parseReply(reply);
    if (displayText) addBubble('ai', displayText);
    if (resultText) addResult(resultText);
  } catch(e) {
    removeThinking();
    // エラー時は入力欄にテキストを戻す
    inputEl.value = text;
    autoResize(inputEl);
    const isServerBusy = e.message && e.message.includes('503');
    const msg = isServerBusy
      ? 'サーバーが混んでいます。少し待ってからもう一度送信してください。'
      : '通信エラーが発生しました。もう一度送信してください。';
    addBubble('system', msg);
  }

  isLoading = false;
  sendBtn.disabled = false;
}

// ============================
// 初期化
// ============================
async function initA() {
  isLoading = true;
  sendBtn.disabled = true;
  addThinking();
  try {
    const reply = await callClaude('開始', 'a');
    removeThinking();
    historyA = [];
    const { displayText } = parseReply(reply);
    if (displayText) {
      addBubble('ai', displayText);
      historyA.push({ role: 'user', content: '開始' });
      historyA.push({ role: 'assistant', content: reply });
    }
  } catch(e) {
    removeThinking();
    addBubble('ai', 'こんにちは！😊 今日は何を伝えたいですか？どんなことでも、まずお話しください。');
  }
  isLoading = false;
  sendBtn.disabled = false;
}

async function initB() {
  if (!bossQuestionSet) {
    addBubble('ai', '上の欄に上司からの質問を入力して「セット」ボタンを押してください。');
    return;
  }
  isLoading = true;
  sendBtn.disabled = true;
  addThinking();
  try {
    const reply = await callClaude('開始', 'b');
    removeThinking();
    historyB = [];
    const { displayText } = parseReply(reply);
    if (displayText) {
      addBubble('ai', displayText);
      historyB.push({ role: 'user', content: '開始' });
      historyB.push({ role: 'assistant', content: reply });
    }
  } catch(e) {
    removeThinking();
    addBubble('ai', 'この質問にどう答えたいか、少し教えてください😊');
  }
  isLoading = false;
  sendBtn.disabled = false;
}

function resetChat() {
  if (!confirm('この会話をリセットしますか？')) return;
  chatEl.innerHTML = '';
  if (currentMode === 'a') {
    historyA = [];
    initA();
  } else {
    historyB = [];
    if (bossQuestionSet) initB();
    else addBubble('ai', '上の欄に上司からの質問を入力して「セット」ボタンを押してください。');
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 130) + 'px';
}

// iOS キーボード対応
if (/iPhone|iPad/.test(navigator.userAgent)) {
  inputEl.addEventListener('focus', () => {
    setTimeout(() => chatEl.scrollTop = chatEl.scrollHeight, 400);
  });
}

// 起動
initA();
</script>
